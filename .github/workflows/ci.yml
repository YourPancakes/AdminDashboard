name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: admindb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore all .NET dependencies
        run: |
          dotnet restore AdminDashboard.sln
        # ✅ Правильный контекст: восстанавливаем решение, чтобы покрыть все проекты

      - name: Build API
        working-directory: AdminDashboard.Api
        run: dotnet build --configuration Release
        # ❌ Убрали --no-restore, иначе assets-файл может отсутствовать

      - name: Run EF Migrations
        working-directory: AdminDashboard.Api
        env:
          ConnectionStrings__Default: Host=localhost;Database=admindb;Username=postgres;Password=postgres
        run: |
          dotnet tool install --global dotnet-ef
          export PATH="$PATH:~/.dotnet/tools"
          dotnet ef database update

      - name: Run API Tests
        run: dotnet test AdminDashboard.Api.Tests/AdminDashboard.Api.Tests.csproj --no-build --verbosity normal

      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install & Build Frontend
        working-directory: Client
        run: |
          npm ci
          npm run build
